[meta]
  dir = "/var/lib/influxdb/meta"

[data]
  dir = "/var/lib/influxdb/data"
  engine = "tsm1"
  wal-dir = "/var/lib/influxdb/wal"

[[udp]]
  enabled = true
  bind-address = ":8089"
  database = "openwisp2"

[[udp]]
  enabled = true
  bind-address = ":8090"
  database = "openwisp2"
  retention-policy = 'short'

# UDP configuration for running tests.
# read-buffer enlarges the kernel UDP socket buffer so bursts of small
# point writes are not silently dropped while the listener is busy, which
# otherwise causes flaky "just-written point not found" test failures.
[[udp]]
  enabled = true
  bind-address = ":8091"
  database = "openwisp2_test"
  batch-size = 1
  batch-pending = 1
  batch-timeout = "0.1s"
  read-buffer = 8388608

[[udp]]
  enabled = true
  bind-address = ":8092"
  database = "openwisp2_test"
  batch-size = 1
  batch-pending = 1
  batch-timeout = "0.1s"
  read-buffer = 8388608
  retention-policy = 'short'
