[meta]
  dir = "/var/lib/influxdb/meta"

[data]
  dir = "/var/lib/influxdb/data"
  engine = "tsm1"
  wal-dir = "/var/lib/influxdb/wal"

[[udp]]
  enabled = true
  bind-address = ":8089"
  database = "openwisp2"

[[udp]]
  enabled = true
  bind-address = ":8090"
  database = "openwisp2"
  retention-policy = 'short'

# UDP configuration for tests. Use a larger socket buffer so InfluxDB does not
# drop bursts of small point writes while the listener is busy.
[[udp]]
  enabled = true
  bind-address = ":8091"
  database = "openwisp2_test"
  batch-size = 1
  batch-pending = 1
  batch-timeout = "0.1s"
  read-buffer = 8388608

[[udp]]
  enabled = true
  bind-address = ":8092"
  database = "openwisp2_test"
  batch-size = 1
  batch-pending = 1
  batch-timeout = "0.1s"
  read-buffer = 8388608
  retention-policy = 'short'
