[agent]
  # Disable Telegraf's automatic hostname tag. If enabled on an
  # existing OpenWISP bucket, it creates different series from the
  # historical data, making charts look empty as if the timeseries
  # database had been reset.
  omit_hostname = true
  interval = "10s"
  round_interval = false
  metric_batch_size = 1
  metric_buffer_limit = 10000
  flush_interval = "1s"
  flush_jitter = "0s"

[[inputs.socket_listener]]
  service_address = "udp://:8089"
  data_format = "influx"
  read_buffer_size = 8388608
  [inputs.socket_listener.tags]
    bucket = "openwisp2"

[[inputs.socket_listener]]
  service_address = "udp://:8090"
  data_format = "influx"
  read_buffer_size = 8388608
  [inputs.socket_listener.tags]
    bucket = "openwisp2_short"

[[inputs.socket_listener]]
  service_address = "udp://:8091"
  data_format = "influx"
  read_buffer_size = 8388608
  [inputs.socket_listener.tags]
    bucket = "openwisp2_test"

[[inputs.socket_listener]]
  service_address = "udp://:8092"
  data_format = "influx"
  read_buffer_size = 8388608
  [inputs.socket_listener.tags]
    bucket = "openwisp2_test_short"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb2:8086"]
  token = "openwisp-token"
  organization = "openwisp"
  bucket = "openwisp2"
  bucket_tag = "bucket"
  exclude_bucket_tag = true
