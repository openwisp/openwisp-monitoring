---
name: OpenWISP Monitoring CI Build

on:
  push:
    branches:
      - master
      - "1.2"
  pull_request:
    branches:
      - master
      - "1.2"
      - gsoc26-add-more-tsdb

jobs:
  build:
    name: Python==${{ matrix.python-version }} | ${{ matrix.django-version }}
    runs-on: ubuntu-24.04

    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        django-version:
          - django~=4.2.0
          - django~=5.1.0
          - django~=5.2.0
        exclude:
          # Python 3.13 supported only in Django >=5.1.3
          - python-version: "3.13"
            django-version: django~=4.2.0

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up test environment
        id: setup_env
        uses: ./.github/actions/setup-test-environment
        with:
          python-version: ${{ matrix.python-version }}
          django-version: ${{ matrix.django-version }}

      - name: Start InfluxDB
        if: ${{ !cancelled() && steps.setup_env.conclusion == 'success' }}
        run: docker compose up -d influxdb

      - name: QA checks
        run: |
          ./run-qa-checks

      - name: Tests
        if: ${{ !cancelled() && steps.setup_env.conclusion == 'success' }}
        run: |
          ./runtests-influxdb
        env:
          SELENIUM_HEADLESS: 1
          GECKO_LOG: 1

      - name: Show gecko web driver log on failures
        if: ${{ failure() }}
        run: |
          [ -f geckodriver.log ] && cat geckodriver.log \
          || echo "There is no gecko web driver log to show."

      - name: Upload Coverage
        if: ${{ success() }}
        uses: coverallsapp/github-action@v2
        with:
          parallel: true
          format: cobertura
          flag-name: python-${{ matrix.python-version }}-${{ matrix.django-version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: false

  influxdb2:
    name: InfluxDB2 | Python==${{ matrix.python-version }} | ${{ matrix.django-version }}
    runs-on: ubuntu-24.04

    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
        django-version:
          - django~=5.2.0

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up test environment
        id: setup_env
        uses: ./.github/actions/setup-test-environment
        with:
          python-version: ${{ matrix.python-version }}
          django-version: ${{ matrix.django-version }}

      - name: Start InfluxDB 2
        if: ${{ !cancelled() && steps.setup_env.conclusion == 'success' }}
        run: docker compose up -d influxdb2

      - name: Tests
        if: ${{ !cancelled() && steps.setup_env.conclusion == 'success' }}
        run: |
          ./runtests-influxdb2

      - name: Upload Coverage
        if: ${{ success() }}
        uses: coverallsapp/github-action@v2
        with:
          parallel: true
          format: cobertura
          flag-name: influxdb2-python-${{ matrix.python-version }}-${{ matrix.django-version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: false

  deploy:
    name: Deploy Docker Image
    runs-on: ubuntu-24.04
    needs:
      - build
      - influxdb2

    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    steps:
      - uses: actions/checkout@master

      # the following action is equivalent to
      # echo "$DOCKER_HUB_SECRET" | docker login --username "$DOCKER_HUB_USERNAME" --password-stdin
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_SECRET }}

      - name: Push to Docker
        run: |
          docker build . -t openwisp/openwisp-monitoring:develop
          docker push openwisp/openwisp-monitoring:develop

  coveralls:
    needs:
      - build
      - influxdb2
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
          fail-on-error: false
