---
name: OpenWISP Monitoring CI Build

on:
  push:
    branches:
      - master
      - "1.2"
  pull_request:
    branches:
      - master
      - "1.2"
      - gsoc26-add-more-tsdb

jobs:
  build:
    name: "${{ matrix.tsdb }}${{ matrix.udp && ' UDP' || '' }} | Python==${{ matrix.python-version }} | ${{ matrix.django-version }}"
    runs-on: ubuntu-24.04

    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
        django-version:
          - django~=5.2.0
        tsdb:
          - influxdb
        # influxdb2 and UDP variants intentionally run only on the latest
        # Python version: the full Python version matrix is already covered
        # by the influxdb runs above, and repeating it for every backend
        # would only make CI slower without adding meaningful coverage.
        include:
          - python-version: "3.13"
            django-version: django~=5.2.0
            tsdb: influxdb2
          - python-version: "3.13"
            django-version: django~=5.2.0
            tsdb: influxdb
            udp: true
          - python-version: "3.13"
            django-version: django~=5.2.0
            tsdb: influxdb2
            udp: true

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Cache APT packages
        uses: actions/cache@v6
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-

      - name: Disable man page auto-update
        run: |
          echo 'set man-db/auto-update false' | sudo debconf-communicate >/dev/null
          sudo dpkg-reconfigure man-db

      - name: Set up and cache Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install dependencies
        run: |
          sudo apt update -qq
          sudo apt -qq install \
            sqlite3 \
            fping \
            gdal-bin \
            libproj-dev \
            libgeos-dev \
            libspatialite-dev \
            spatialite-bin \
            libsqlite3-mod-spatialite
          pip install -U pip wheel setuptools
          pip install -r requirements-test.txt
          pip install -U -I -e .
          pip install -U "${{ matrix.django-version }}"
          sudo npm install -g prettier

      - name: Start Timeseries DB
        run: |
          services="${{ matrix.tsdb }}"
          if [ "${{ matrix.udp }}" != "true" ] || [ "${{ matrix.tsdb }}" != "influxdb2" ]; then
            :
          else
            services="$services telegraf"
          fi
          docker compose up -d $services

          if [ "${{ matrix.tsdb }}" = "influxdb2" ]; then
            url="http://localhost:8087/health"
          else
            url="http://localhost:8086/query?q=SHOW%20DATABASES"
          fi

          for attempt in $(seq 1 30); do
            if curl -fsS "$url" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done

          echo "Timeseries DB did not become ready at $url"
          docker compose logs ${{ matrix.tsdb }}
          exit 1

      - name: QA checks
        run: |
          ./run-qa-checks
        env:
          TIMESERIES_BACKEND: ${{ matrix.tsdb }}

      - name: Tests
        run: |
          ./runtests
        env:
          TSDB: ${{ matrix.tsdb }}
          TIMESERIES_UDP: ${{ matrix.udp && '1' || '' }}
          SELENIUM_HEADLESS: 1
          GECKO_LOG: 1

      - name: Show gecko web driver log on failures
        if: ${{ failure() }}
        run: |
          [ -f geckodriver.log ] && cat geckodriver.log \
          || echo "There is no gecko web driver log to show."

      - name: Upload Coverage
        if: ${{ success() }}
        uses: coverallsapp/github-action@v2
        with:
          parallel: true
          format: cobertura
          flag-name: ${{ matrix.tsdb }}${{ matrix.udp && '-udp' || '' }}-python-${{ matrix.python-version }}-${{ matrix.django-version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: false

  deploy:
    name: Deploy Docker Image
    runs-on: ubuntu-24.04
    needs:
      - build

    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    steps:
      - uses: actions/checkout@master

      # the following action is equivalent to
      # echo "$DOCKER_HUB_SECRET" | docker login --username "$DOCKER_HUB_USERNAME" --password-stdin
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_SECRET }}

      - name: Push to Docker
        run: |
          docker build . -t openwisp/openwisp-monitoring:develop
          docker push openwisp/openwisp-monitoring:develop

  coveralls:
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
          fail-on-error: false
